<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paulo Ferreira — PUP-e Transmissora</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FAF9F8;
      --bg2:       #ffffff;
      --ink:       #1F2326;
      --ink-mid:   rgba(31,35,38,0.55);
      --ink-muted: rgba(31,35,38,0.32);
      --border:    rgba(31,35,38,0.10);
      --border-strong: rgba(31,35,38,0.18);
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'IBM Plex Sans', sans-serif;
    }

    html, body {
      min-height: 100svh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg2);
      border: 1px solid var(--border-strong);
      padding: 48px 40px 40px;
      animation: fadeUp 0.85s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--ink);
      opacity: 0.25;
      margin-bottom: 36px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Photo */
    .photo-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      overflow: hidden;
      margin-bottom: 28px;
      background: #ede9e3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-placeholder svg {
      width: 36px;
      height: 36px;
      color: var(--ink-muted);
    }

    /* Eyebrow */
    .eyebrow {
      font-family: var(--sans);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
      margin-bottom: 10px;
    }
    .eyebrow .brand {
      letter-spacing: 0.05em;
    }
    .eyebrow .rest {
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* Name */
    h1 {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 2.6rem;
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: var(--ink);
      margin-bottom: 8px;
    }

    /* Role */
    .role {
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-mid);
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      width: 28px;
      height: 1px;
      background: var(--ink);
      opacity: 0.2;
      margin-bottom: 32px;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink-mid);
      text-decoration: none;
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      border-color: var(--ink);
      color: #FAF9F8;
      background: #1F2326;
    }
    .btn:hover .btn-icon {
      opacity: 1;
      color: #FAF9F8;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-icon {
      flex-shrink: 0;
      color: var(--ink);
      opacity: 0.4;
      display: flex;
      align-items: center;
    }

    .btn-icon svg {
      width: 15px;
      height: 15px;
    }



    /* Footer */
    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .tagline {
      font-family: var(--sans);
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--ink);
      color: #FAF9F8;
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 11px 20px;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
      opacity: 0;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
